function IronLog() {
const [loading, setLoading] = useState(true);
const [day, setDay] = useState(autoDay());
const [view, setView] = useState(“log”);
const [sets, setSets] = useState({});
const [done, setDone] = useState({});
const [exerciseOrder, setExerciseOrder] = useState(null); // null = default order
const [activeEx, setActiveEx] = useState(null);
const [weight, setWeight] = useState(””);
const [reps, setReps] = useState(””);
const [editIdx, setEditIdx] = useState(null);
const [history, setHistory] = useState({});
const [customExercises, setCustomExercises] = useState([]);
const [showAddEx, setShowAddEx] = useState(false);
const [newExName, setNewExName] = useState(””);

const [toast, setToast] = useState(null);

const [timerSeconds, setTimerSeconds] = useState(0);
const [claudeOpened, setClaudeOpened] = useState(false);

const [sheetsUrl, setSheetsUrl] = useState(SHEETS_URL);
const [sheetsSyncStatus, setSheetsSyncStatus] = useState(null); // null | “sending” | “ok” | “error”
const [showSettings, setShowSettings] = useState(false);
const [settingsUrl, setSettingsUrl] = useState(””);
const repsRef = useRef(null);
const weightRef = useRef(null);
const timerRef = useRef(null);
const newExRef = useRef(null);

useEffect(() => {
(async () => {
const [hist, s, d, cex, order, sUrl] = await Promise.all([
store.get(“iron-history”),
store.get(`sets-${day}-${todayKey()}`),
store.get(`done-${day}-${todayKey()}`),
store.get(`custom-ex-${day}-${todayKey()}`),
store.get(`order-${day}`),
store.get(“sheets-url”),
]);
if (hist) setHistory(hist);
if (s) setSets(s);
if (d) setDone(d);
if (cex) setCustomExercises(cex);
if (order) setExerciseOrder(order);
if (sUrl) { setSheetsUrl(sUrl); setSettingsUrl(sUrl); } else { setSettingsUrl(SHEETS_URL); }
setLoading(false);
})();
}, []);

useEffect(() => {
if (activeEx && editIdx === null) {
setTimeout(() => { if (repsRef.current) { repsRef.current.focus(); repsRef.current.select(); } }, 100);
}
}, [activeEx]);

useEffect(() => {
if (restTimer !== null && restTimer > 0) {
setTimerSeconds(0);
timerRef.current = setInterval(() => {
setTimerSeconds(prev => {
if (prev + 1 >= restTimer) {
clearInterval(timerRef.current);
setRestTimer(null);
showToast(“REST DONE — GO”);
setTimeout(() => { if (repsRef.current) { repsRef.current.focus(); repsRef.current.select(); } }, 200);
return 0;
}
return prev + 1;
});
}, 1000);
return () => clearInterval(timerRef.current);
}
}, [restTimer]);

function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2400); }

function getBaseExercises() { return DEFAULT_WORKOUTS[day]?.exercises || []; }

function getAllExercises() {
const base = getBaseExercises();
const all = […base, …customExercises];
if (exerciseOrder && exerciseOrder.length > 0) {
const ordered = [];
const map = {};
all.forEach(ex => { map[ex.name] = ex; });
exerciseOrder.forEach(name => { if (map[name]) { ordered.push(map[name]); delete map[name]; } });
Object.values(map).forEach(ex => ordered.push(ex));
return ordered;
}
return all;
}

async function saveOrder(list) {
const names = list.map(e => e.name);
setExerciseOrder(names);
await store.set(`order-${day}`, names);
}

async function moveExercise(idx, dir) {
const all = getAllExercises();
const newIdx = idx + dir;
if (newIdx < 0 || newIdx >= all.length) return;
const arr = […all];
[arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
await saveOrder(arr);
}

async function switchDay(d) {
setDay(d); setActiveEx(null); setWeight(””); setReps(””); setEditIdx(null);
setClaudeOpened(false); setLogText(””); setView(“log”); setReordering(false);
const [s, dn, cex, order] = await Promise.all([
store.get(`sets-${d}-${todayKey()}`),
store.get(`done-${d}-${todayKey()}`),
store.get(`custom-ex-${d}-${todayKey()}`),
store.get(`order-${d}`),
]);
setSets(s || {}); setDone(dn || {}); setCustomExercises(cex || []); setExerciseOrder(order);
}

function findLastExercise(exName) {
const entries = Object.values(history).sort((a, b) => new Date(b.date) - new Date(a.date));
for (const e of entries) { const s = e.sets?.[exName]; if (s?.length) return s[s.length - 1]; }
return null;
}

function openExercise(ex) {
if (activeEx === ex) { setActiveEx(null); setWeight(””); setReps(””); setEditIdx(null); return; }
setActiveEx(ex); setEditIdx(null);
const exSets = sets[ex] || [];
if (exSets.length > 0) { const l = exSets[exSets.length - 1]; setWeight(l.weight); setReps(l.reps); }
else { const l = findLastExercise(ex); if (l) { setWeight(l.weight); setReps(l.reps); } else { setWeight(””); setReps(””); } }
setTimeout(() => { if (repsRef.current) { repsRef.current.focus(); repsRef.current.select(); } }, 120);
}

async function addOrUpdateSet() {
if (!activeEx || !weight || !reps) return;
const entry = { weight: String(weight), reps: String(reps) };
let updated;
if (editIdx !== null) {
const arr = […(sets[activeEx] || [])]; arr[editIdx] = entry;
updated = { …sets, [activeEx]: arr }; setEditIdx(null); showToast(“Updated”);
} else {
updated = { …sets, [activeEx]: […(sets[activeEx] || []), entry] }; showToast(“Logged”);
}
setSets(updated);
await store.set(`sets-${day}-${todayKey()}`, updated);
if (editIdx === null) {
const allEx = getAllExercises();
const exData = allEx.find(e => e.name === activeEx);
if (exData) {
const n = updated[activeEx]?.length || 0;
if (n < exData.sets) {
const comp = [“Leg Press”,“Lat Pulldown”,“Machine Chest Press”,“Seated Cable Row”,“Machine Shoulder Press”].some(c => activeEx.includes(c));
setRestTimer(comp ? 120 : 75);
}
}
}
setTimeout(() => { if (repsRef.current) { repsRef.current.focus(); repsRef.current.select(); } }, 60);
}

function startEditSet(ex, i) {
setActiveEx(ex); setEditIdx(i);
const s = sets[ex][i]; setWeight(s.weight); setReps(s.reps);
setTimeout(() => { if (repsRef.current) { repsRef.current.focus(); repsRef.current.select(); } }, 80);
}

async function removeSet(ex, i) {
const arr = (sets[ex] || []).filter((_, idx) => idx !== i);
const updated = { …sets }; if (arr.length) updated[ex] = arr; else delete updated[ex];
setSets(updated); if (editIdx === i) setEditIdx(null);
await store.set(`sets-${day}-${todayKey()}`, updated);
}

async function toggleDone(ex) {
const updated = { …done, [ex]: !done[ex] }; setDone(updated);
await store.set(`done-${day}-${todayKey()}`, updated);
}

async function addCustomExercise() {
if (!newExName.trim()) return;
const ex = { name: newExName.trim(), sets: parseInt(newExSets) || 3, reps: newExReps || “10-12”, custom: true };
const updated = […customExercises, ex]; setCustomExercises(updated);
await store.set(`custom-ex-${day}-${todayKey()}`, updated);
// Also update order
const all = […getAllExercises(), ex];
await saveOrder(all);
setNewExName(””); setNewExSets(“3”); setNewExReps(“10-12”); setShowAddEx(false);
showToast(“Exercise added”);
}

async function removeCustomExercise(idx) {
const ex = customExercises[idx];
const updated = customExercises.filter((_, i) => i !== idx); setCustomExercises(updated);
await store.set(`custom-ex-${day}-${todayKey()}`, updated);
if (sets[ex.name]) { const u = { …sets }; delete u[ex.name]; setSets(u); await store.set(`sets-${day}-${todayKey()}`, u); }
// Update order
const newAll = getAllExercises().filter(e => e.name !== ex.name);
await saveOrder(newAll);
}

function buildLogText(checkIn) {
const w = DEFAULT_WORKOUTS[day];
const allEx = getAllExercises();
const vol = Object.values(sets).flat().reduce((a, s) => a + (parseFloat(s.weight)||0) * (parseInt(s.reps)||0), 0);
const setsText = allEx.map(ex => {

return `${ex.name} (target ${ex.sets}x${ex.reps}): ${xs.map((s,i) => `Set ${i+1}: ${s.weight}lb x ${s.reps}`).join(", ")}`;
}).filter(Boolean).join(”\n”);
const skipped = allEx.filter(ex => !(sets[ex.name]?.length)).map(e => e.name);

```
// Same-day history only (e.g. all previous Thursday sessions)

}).join("\n\n");

// Check-in section

async function sendToSheets(entry) {
if (!sheetsUrl) return;
setSheetsSyncStatus(“sending”);
try {
const resp = await fetch(sheetsUrl, {
method: “POST”,
headers: { “Content-Type”: “text/plain” }, // Apps Script needs this for CORS
body: JSON.stringify(entry),
});
const data = await resp.json();
if (data.status === “ok”) {
setSheetsSyncStatus(“ok”);
} else {
console.error(“Sheets error:”, data);
setSheetsSyncStatus(“error”);
}
} catch (err) {
console.error(“Sheets sync failed:”, err);
setSheetsSyncStatus(“error”);
}
}

setHistory(updatedHist);
await store.set(“iron-history”, updatedHist);
const text = buildLogText(checkIn || {});
setLogText(text);
setShowFinishModal(false);
setView(“summary”);

// ─── HISTORY VIEW with Weekly Volume Summary ─────────────────────────────────
function HistoryView({ history }) {
const entries = Object.values(history).sort((a, b) => new Date(b.date) - new Date(a.date));
const [expanded, setExpanded] = useState(null);
const [histView, setHistView] = useState(“sessions”); // “sessions” | “weekly”

// Compute weekly volumes
function getWeeklyData() {
const weeks = {};
entries.forEach(e => {
const d = new Date(e.date);
const sun = new Date(d); sun.setDate(d.getDate() - d.getDay());
const wk = sun.toISOString().slice(0, 10);
if (!weeks[wk]) weeks[wk] = { sessions: 0, volume: 0, sets: 0, start: sun };
weeks[wk].sessions += 1;
weeks[wk].sets += Object.values(e.sets || {}).reduce((a, b) => a + b.length, 0);
weeks[wk].volume += Object.values(e.sets || {}).flat().reduce((a, s) => a + (parseFloat(s.weight)||0) * (parseInt(s.reps)||0), 0);
});
return Object.entries(weeks).sort(([a],[b]) => b.localeCompare(a)).map(([k, v]) => {
const start = new Date(k);
const end = new Date(start); end.setDate(start.getDate() + 6);

function SummaryView({ day, sets, history, customExercises, logText, claudeOpened, sheetsSyncStatus, sheetsUrl, onBack }) {
const [copied, setCopied] = useState(false);
const [showLog, setShowLog] = useState(false);
const w = DEFAULT_WORKOUTS[day];
const totalSets = Object.values(sets).reduce((a, b) => a + b.length, 0);
const totalVol = Object.values(sets).flat().reduce((a, s) => a + (parseFloat(s.weight)||0) * (parseInt(s.reps)||0), 0);
const exercisesDone = Object.keys(sets).length;
const prev = Object.values(history).filter(e => e.day === day && e.date !== `${todayKey()}-${day}`).sort((a,b) => new Date(b.date)-new Date(a.date))[0];
const prevVol = prev ? Object.values(prev.sets||{}).flat().reduce((a,s) => a + (parseFloat(s.weight)||0)*(parseInt(s.reps)||0), 0) : 0;
const volDiff = prevVol > 0 ? ((totalVol - prevVol) / prevVol * 100).toFixed(1) : null;

async function copyLog() {
try {
await navigator.clipboard.writeText(logText);
setCopied(true);
setTimeout(() => setCopied(false), 2000);
} catch {
// Fallback: select a hidden textarea
const ta = document.createElement(“textarea”);
ta.value = logText;
document.body.appendChild(ta);
ta.select();
document.execCommand(“copy”);
document.body.removeChild(ta);
setCopied(true);
setTimeout(() => setCopied(false), 2000);
}
}

function openInClaude() {
const url = `https://claude.ai/new?q=${encodeURIComponent(logText)}`;
window.open(url, “_blank”);
}

function downloadLog() {
const blob = new Blob([logText], { type: “text/plain” });
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url;
a.download = `workout-${day.toLowerCase()}-${todayKey()}.txt`;
a.click();
URL.revokeObjectURL(url);
}
